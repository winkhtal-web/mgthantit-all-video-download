<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGTHANTIT Premium Cloud Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #140727 0%, #05010a 100%); }
        .neon-glow { box-shadow: 0 0 30px rgba(147, 51, 234, 0.3); }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-5xl bg-[#0b0416]/90 backdrop-blur-2xl rounded-2xl border border-purple-900/40 overflow-hidden shadow-2xl neon-glow flex flex-col md:flex-row">
        
        <div class="w-full md:w-64 bg-[#06020c] p-6 border-r border-purple-950/60 flex flex-col justify-between">
            <div>
                <div class="flex items-center space-x-3 mb-8">
                    <div class="p-2.5 bg-purple-600 rounded-xl text-white shadow-lg shadow-purple-600/40"><i class="fas fa-cloud-download-alt text-xl"></i></div>
                    <div>
                        <h2 class="font-bold text-sm tracking-wider">MGTHANTIT</h2>
                        <p class="text-[10px] text-purple-400 font-mono">CLOUD ENGINE</p>
                    </div>
                </div>
                <nav class="space-y-2">
                    <a href="#" class="flex items-center space-x-3 bg-purple-900/30 text-purple-300 p-3 rounded-xl border border-purple-500/20"><i class="fas fa-layer-group"></i> <span class="text-sm font-medium">Dashboard</span></a>
                </nav>
            </div>
            <p class="text-[11px] text-purple-500/50 text-center md:text-left">Dev by Khaing Min Thant</p>
        </div>

        <div class="flex-1 p-6 md:p-8 flex flex-col justify-between">
            <div>
                <h1 class="text-xl font-bold mb-4 tracking-wide text-purple-100">CLOUD MULTI-DOWNLOADER</h1>
                <div class="flex flex-col sm:flex-row gap-3 mb-6">
                    <input type="text" id="videoLink" placeholder="Paste link (YouTube, TikTok, Facebook)..." 
                           class="flex-1 bg-[#120924] border border-purple-900/60 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 text-white placeholder-purple-400/30">
                </div>
                
                <button onclick="triggerDownload()" class="w-full bg-purple-600 hover:bg-purple-700 font-medium py-3.5 rounded-xl text-sm transition flex items-center justify-center space-x-2 shadow-lg shadow-purple-600/20 mb-8">
                    <i class="fas fa-arrow-alt-circle-down"></i> <span>Download Media Now</span>
                </button>

                <div id="statusCard" class="hidden bg-[#070210] border border-purple-950 p-6 rounded-xl">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-sm font-medium text-purple-300" id="statusTitle">Processing...</span>
                        <span class="text-xs bg-purple-900/50 text-purple-400 px-3 py-1 rounded-full border border-purple-800/40" id="loaderIcon"><i class="fas fa-spinner animate-spin"></i></span>
                    </div>
                    <div class="w-full bg-purple-950/30 rounded-full h-2 overflow-hidden border border-purple-900/20">
                        <div id="progressBar" class="bg-gradient-to-r from-purple-500 to-pink-500 h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function triggerDownload() {
            const url = document.getElementById('videoLink').value;
            if(!url) return alert("ကျေးဇူးပြု၍ လင့်ခ်တစ်ခုခု ထည့်ပေးပါဗျာ။");

            const statusCard = document.getElementById('statusCard');
            const progressBar = document.getElementById('progressBar');
            const statusTitle = document.getElementById('statusTitle');

            statusCard.classList.remove('hidden');
            progressBar.style.width = '40%';
            statusTitle.innerText = "Connecting Cloud Engine...";

            const apiUrl = `/api/download?url=${encodeURIComponent(url)}`;
            
            setTimeout(() => { progressBar.style.width = '70%'; statusTitle.innerText = "Bypassing restrictions..."; }, 1200);

            window.location.href = apiUrl;

            setTimeout(() => {
                progressBar.style.width = '100%';
                statusTitle.innerText = "Download Sent Successfully!";
                document.getElementById('loaderIcon').innerHTML = "<i class='fas fa-check'></i>";
            }, 4000);
        }
    </script>
</body>
</html>
